name: Frontend Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        env:
          # Esta variable es la que usará tu código de React/Vite para hablar con el Backend
          NEXT_PUBLIC_API_URL: "http://${{ secrets.EC2_HOST }}:8080/api/v1"
          
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2 # Asegúrate de que esta sea tu región

      - name: Deploy to S3
        run: |
          aws s3 sync ./out s3://psifirm-semi1 --delete